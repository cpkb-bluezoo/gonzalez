<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" width="760" height="260" role="img" aria-labelledby="title desc">
  <title id="title">Gonzalez native and SAX transform event model</title>
  <desc id="desc">A Gonzalez Parser sends XMLHandler events directly to the transformer. Foreign readers and TransformerHandler send SAX events through the transformer's SAX facade. Results leave through standard JAXP result types.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#edf2f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="transformerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ebf8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bee3f8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nativeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fff4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c6f6d5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 600; fill: #2d3748; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #4a5568; }
    .sublabel { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; fill: #718096; }
  </style>
  
  <!-- Native input -->
  <rect x="20" y="35" width="180" height="70" rx="6" fill="url(#nativeGradient)" stroke="#38a169" stroke-width="1.5"/>
  <text x="110" y="60" text-anchor="middle" class="label">Gonzalez Parser</text>
  <text x="110" y="77" text-anchor="middle" class="sublabel">NamespaceFilter → XMLHandler</text>
  <text x="110" y="92" text-anchor="middle" class="sublabel">no SAXAdapter</text>
  <line x1="200" y1="70" x2="287" y2="112" stroke="#38a169" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Standards input -->
  <rect x="20" y="155" width="180" height="70" rx="6" fill="url(#boxGradient)" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="110" y="180" text-anchor="middle" class="label">SAX / JAXP Input</text>
  <text x="110" y="197" text-anchor="middle" class="sublabel">foreign XMLReader / SAXSource</text>
  <text x="110" y="212" text-anchor="middle" class="sublabel">TransformerHandler callbacks</text>
  <line x1="200" y1="190" x2="287" y2="148" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Transformer box -->
  <rect x="300" y="85" width="180" height="90" rx="8" fill="url(#transformerGradient)" stroke="#3182ce" stroke-width="2"/>
  <text x="390" y="116" text-anchor="middle" class="title">Transformer</text>
  <text x="390" y="136" text-anchor="middle" class="sublabel">native handler + SAX facade</text>
  <text x="390" y="153" text-anchor="middle" class="sublabel">streaming XSLT processing</text>

  <!-- JAXP output -->
  <line x1="480" y1="130" x2="550" y2="130" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="563" y="85" width="177" height="90" rx="6" fill="url(#boxGradient)" stroke="#cbd5e0" stroke-width="1.5"/>
  <text x="651.5" y="111" text-anchor="middle" class="label">JAXP Result</text>
  <text x="651.5" y="131" text-anchor="middle" class="sublabel">SAXResult → SAX callbacks</text>
  <text x="651.5" y="148" text-anchor="middle" class="sublabel">StreamResult → serializer</text>
  <text x="651.5" y="165" text-anchor="middle" class="sublabel">other standard result types</text>
</svg>
