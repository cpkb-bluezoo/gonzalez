<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="title desc">
  <title id="title">Gonzalez Scanner event pipeline</title>
  <desc id="desc">ByteBuffer input is decoded into characters, scanned directly against the XML grammar, emitted as XMLHandler events, namespace-filtered when enabled, and adapted to standard SAX handlers. External entity resolution feeds the Scanner separately.</desc>

  <defs>
    <linearGradient id="source" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17365d"/>
      <stop offset="1" stop-color="#245a8d"/>
    </linearGradient>
    <linearGradient id="decode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#374151"/>
      <stop offset="1" stop-color="#4b5563"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#713f12"/>
      <stop offset="1" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="event" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14532d"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="adapt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
    <style>
      .heading { font-family: Georgia, serif; font-weight: 700; fill: #f8fafc; }
      .label { font-family: Arial, Helvetica, sans-serif; font-weight: 700; fill: #f8fafc; }
      .mono { font-family: Menlo, Consolas, monospace; fill: #e2e8f0; }
      .muted { font-family: Arial, Helvetica, sans-serif; fill: #a8b3c2; }
      .box { filter: url(#shadow); stroke-width: 1.5; }
      .flow { fill: none; stroke: #f59e0b; stroke-width: 3; marker-end: url(#arrow); }
      .thinFlow { fill: none; stroke: #f59e0b; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#0b1118"/>
  <text id="pipelineTitle" x="600" y="38" text-anchor="middle" class="heading" font-size="25">Gonzalez Scanner Event Pipeline</text>
  <text x="600" y="61" text-anchor="middle" class="mono" font-size="11">direct XML grammar scanning - no tokenizer or intermediate token stream</text>

  <!-- Input -->
  <g transform="translate(30 108)">
    <rect class="box" width="150" height="205" rx="10" fill="url(#source)" stroke="#4b94cf"/>
    <text x="75" y="27" text-anchor="middle" class="label" font-size="13">BYTE SOURCES</text>
    <g transform="translate(18 48)">
      <rect width="114" height="38" rx="6" fill="#1d4f7a" stroke="#60a5fa"/>
      <text x="57" y="16" text-anchor="middle" class="mono" font-size="9">SocketChannel</text>
      <text x="57" y="29" text-anchor="middle" class="mono" font-size="8">SSLEngine output</text>
    </g>
    <g transform="translate(18 96)">
      <rect width="114" height="38" rx="6" fill="#1d4f7a" stroke="#60a5fa"/>
      <text x="57" y="23" text-anchor="middle" class="mono" font-size="9">FileChannel</text>
    </g>
    <g transform="translate(18 144)">
      <rect width="114" height="38" rx="6" fill="#1d4f7a" stroke="#60a5fa"/>
      <text x="57" y="16" text-anchor="middle" class="mono" font-size="9">InputStream</text>
      <text x="57" y="29" text-anchor="middle" class="mono" font-size="8">blocking wrapper</text>
    </g>
  </g>

  <path class="flow" d="M180 210 H224"/>
  <text x="202" y="195" text-anchor="middle" class="mono" font-size="9">bytes</text>

  <!-- Parser byte entry and decoder -->
  <g transform="translate(235 100)">
    <rect class="box" width="205" height="220" rx="10" fill="url(#decode)" stroke="#94a3b8"/>
    <text x="102.5" y="27" text-anchor="middle" class="label" font-size="13">PARSER BYTE STAGE</text>
    <rect x="20" y="48" width="165" height="42" rx="6" fill="#273445" stroke="#94a3b8"/>
    <text x="102.5" y="66" text-anchor="middle" class="mono" font-size="10">Parser.receive(ByteBuffer)</text>
    <text x="102.5" y="81" text-anchor="middle" class="mono" font-size="8">or parse(InputSource)</text>
    <path class="thinFlow" d="M102.5 94 V112"/>
    <rect x="20" y="117" width="165" height="67" rx="6" fill="#334155" stroke="#94a3b8"/>
    <text x="102.5" y="138" text-anchor="middle" class="mono" font-size="9">ExternalEntityDecoder</text>
    <text x="102.5" y="154" text-anchor="middle" class="mono" font-size="8">BOM + XML declaration</text>
    <text x="102.5" y="168" text-anchor="middle" class="mono" font-size="8">charset + line normalization</text>
    <text x="102.5" y="207" text-anchor="middle" class="muted" font-size="9">reuses bounded byte/char buffers</text>
  </g>

  <path class="flow" d="M440 210 H484"/>
  <text x="462" y="195" text-anchor="middle" class="mono" font-size="9">CharBuffer</text>

  <!-- Scanner -->
  <g transform="translate(495 86)">
    <rect class="box" width="265" height="248" rx="12" fill="url(#scan)" stroke="#fbbf24" stroke-width="2"/>
    <text x="132.5" y="28" text-anchor="middle" class="heading" font-size="18">Scanner</text>
    <text x="132.5" y="47" text-anchor="middle" class="mono" font-size="9">resumable direct grammar recognizer</text>

    <rect x="18" y="64" width="229" height="50" rx="6" fill="#854d0e" stroke="#fbbf24"/>
    <text x="132.5" y="83" text-anchor="middle" class="mono" font-size="9">XML 1.0 / XML 1.1 grammar</text>
    <text x="132.5" y="99" text-anchor="middle" class="mono" font-size="8">elements / attributes / text / lexical</text>

    <rect x="18" y="122" width="110" height="57" rx="6" fill="#854d0e" stroke="#fbbf24"/>
    <text x="73" y="143" text-anchor="middle" class="mono" font-size="9">DTDModel</text>
    <text x="73" y="158" text-anchor="middle" class="mono" font-size="8">decls / defaults</text>
    <text x="73" y="171" text-anchor="middle" class="mono" font-size="8">validation</text>

    <rect x="137" y="122" width="110" height="57" rx="6" fill="#854d0e" stroke="#fbbf24"/>
    <text x="192" y="143" text-anchor="middle" class="mono" font-size="9">Entity state</text>
    <text x="192" y="158" text-anchor="middle" class="mono" font-size="8">limits / nesting</text>
    <text x="192" y="171" text-anchor="middle" class="mono" font-size="8">standalone rules</text>

    <text x="132.5" y="204" text-anchor="middle" class="muted" font-size="9">incomplete constructs resume on next chunk</text>
    <rect x="63" y="217" width="139" height="18" rx="9" fill="#166534"/>
    <text x="132.5" y="230" text-anchor="middle" class="label" font-size="8">NO TOKEN OBJECT PIPELINE</text>
  </g>

  <!-- External entity side path -->
  <g transform="translate(480 385)">
    <rect class="box" width="295" height="95" rx="9" fill="#182536" stroke="#64748b"/>
    <text x="147.5" y="23" text-anchor="middle" class="label" font-size="12">EXTERNAL ENTITY PATH</text>
    <text x="147.5" y="44" text-anchor="middle" class="mono" font-size="8">EntityResolver2 - protocol policy - fetch</text>
    <text x="147.5" y="60" text-anchor="middle" class="mono" font-size="8">XmlDeclUtil decode - inline DTD/entity scan</text>
    <text x="147.5" y="80" text-anchor="middle" class="muted" font-size="8">disabled by secure defaults; resolution may block</text>
  </g>
  <path class="thinFlow" d="M627 385 V342"/>

  <path class="flow" d="M760 210 H804"/>
  <text x="782" y="195" text-anchor="middle" class="mono" font-size="9">events</text>

  <!-- XMLHandler and NamespaceFilter -->
  <g transform="translate(815 91)">
    <rect class="box" width="165" height="238" rx="10" fill="url(#event)" stroke="#4ade80"/>
    <text x="82.5" y="27" text-anchor="middle" class="label" font-size="13">XMLHandler</text>
    <text x="82.5" y="43" text-anchor="middle" class="mono" font-size="8">internal streaming vocabulary</text>
    <g class="mono" font-size="8">
      <text x="18" y="69">startElement(qName)</text>
      <text x="18" y="86">startAttribute(...)</text>
      <text x="18" y="103">attributeValueContent()</text>
      <text x="18" y="120">characters(CharBuffer)</text>
      <text x="18" y="137">namespace(prefix, uri)</text>
      <text x="18" y="154">elementDecl / entityDecl</text>
      <text x="18" y="171">comment / CDATA / DTD</text>
    </g>
    <rect x="14" y="188" width="137" height="35" rx="5" fill="#166534" stroke="#4ade80"/>
    <text x="82.5" y="203" text-anchor="middle" class="mono" font-size="8">NamespaceFilter</text>
    <text x="82.5" y="216" text-anchor="middle" class="mono" font-size="7">only when namespaces=true</text>
  </g>

  <path class="flow" d="M980 210 H1014"/>

  <!-- SAX Adapter -->
  <g transform="translate(1025 100)">
    <rect class="box" width="145" height="220" rx="10" fill="url(#adapt)" stroke="#a78bfa"/>
    <text x="72.5" y="28" text-anchor="middle" class="label" font-size="13">SAXAdapter</text>
    <text x="72.5" y="45" text-anchor="middle" class="mono" font-size="8">name resolution</text>
    <text x="72.5" y="59" text-anchor="middle" class="mono" font-size="8">Attributes2 assembly</text>
    <g transform="translate(12 78)" class="mono" font-size="8">
      <rect width="121" height="22" rx="4" fill="#5b21b6"/>
      <text x="60.5" y="15" text-anchor="middle">ContentHandler</text>
      <rect y="29" width="121" height="22" rx="4" fill="#5b21b6"/>
      <text x="60.5" y="44" text-anchor="middle">LexicalHandler</text>
      <rect y="58" width="121" height="22" rx="4" fill="#5b21b6"/>
      <text x="60.5" y="73" text-anchor="middle">DeclHandler</text>
      <rect y="87" width="121" height="22" rx="4" fill="#5b21b6"/>
      <text x="60.5" y="102" text-anchor="middle">DTD / ErrorHandler</text>
    </g>
    <text x="72.5" y="207" text-anchor="middle" class="muted" font-size="8">SAX2 / JAXP boundary</text>
  </g>

  <!-- Explanatory lower panel -->
  <g transform="translate(30 520)">
    <rect width="1140" height="140" rx="10" fill="#121c27" stroke="#334155" stroke-width="1.5"/>
    <text x="570" y="27" text-anchor="middle" class="label" font-size="14">Pipeline Properties</text>

    <g transform="translate(28 48)">
      <circle cx="10" cy="10" r="10" fill="#2563eb"/>
      <text x="10" y="14" text-anchor="middle" class="label" font-size="10">1</text>
      <text x="29" y="8" class="label" font-size="10">Push input</text>
      <text x="29" y="24" class="muted" font-size="9">receive() consumes available bytes and returns control.</text>
    </g>
    <g transform="translate(400 48)">
      <circle cx="10" cy="10" r="10" fill="#d97706"/>
      <text x="10" y="14" text-anchor="middle" class="label" font-size="10">2</text>
      <text x="29" y="8" class="label" font-size="10">Direct scan</text>
      <text x="29" y="24" class="muted" font-size="9">Grammar recognition and DTD processing share one Scanner.</text>
    </g>
    <g transform="translate(780 48)">
      <circle cx="10" cy="10" r="10" fill="#16a34a"/>
      <text x="10" y="14" text-anchor="middle" class="label" font-size="10">3</text>
      <text x="29" y="8" class="label" font-size="10">Streaming events</text>
      <text x="29" y="24" class="muted" font-size="9">CharBuffer content is adapted only at the SAX boundary.</text>
    </g>

    <g transform="translate(28 94)">
      <circle cx="10" cy="10" r="10" fill="#7c3aed"/>
      <text x="10" y="14" text-anchor="middle" class="label" font-size="10">4</text>
      <text x="29" y="8" class="label" font-size="10">Bounded main-document state</text>
      <text x="29" y="24" class="muted" font-size="9">Only active stacks and incomplete constructs survive chunk boundaries.</text>
    </g>
    <g transform="translate(590 94)">
      <circle cx="10" cy="10" r="10" fill="#dc2626"/>
      <text x="10" y="14" text-anchor="middle" class="label" font-size="10">5</text>
      <text x="29" y="8" class="label" font-size="10">Secure external resources</text>
      <text x="29" y="24" class="muted" font-size="9">Entity flags, accessExternalDTD and expansion limits are enforced in Scanner.</text>
    </g>
  </g>

  <text x="600" y="700" text-anchor="middle" class="mono" font-size="9" fill="#64748b">ByteBuffer - ExternalEntityDecoder - Scanner - XMLHandler / NamespaceFilter - SAXAdapter - SAX2 handlers</text>
</svg>
